<!DOCTYPE html>
<html>
<head>
  <title>Join Nexus Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0"></script>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 400px; margin: 50px auto; text-align: center; }
    input { padding: 12px; width: 90%; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { padding: 12px 30px; background: #000; color: white; border: none; border-radius: 5px; width: 95%; }
    #msg { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h1>Join Nexus Pro</h1>
<p>Enter your name to register</p>
<input id="nameInput" placeholder="Your full name">
<button onclick="register()">Join Now</button>
<div id="msg"></div>

<script>
const SUPABASE_URL = 'https://ifndfvvxxazhbvsssvtv.supabase.co'
const SUPABASE_KEY = 'sb_publishable_9KWRZ03ES_a7PUpeopmV9g_z8RIbEl9'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function register(){
  const name = document.getElementById('nameInput').value.trim();
  const msg = document.getElementById('msg');
  
  if (!name) {
    msg.innerHTML = 'Please enter your name';
    msg.style.color = 'red';
    return;
  }
  
  msg.innerHTML = 'Registering...';
  msg.style.color = 'black';
  
  const { error } = await supabase.from('members').insert([{ name: name, balance: 0 }]);
  
  if (error) {
    msg.innerHTML = 'Error: ' + error.message;
    msg.style.color = 'red';
  } else {
    msg.innerHTML = 'Success! You are registered. Welcome to Nexus Pro!';
    msg.style.color = 'green';
    document.getElementById('nameInput').value = '';
  }
}
</script>

</body>
</html>
