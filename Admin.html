<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>Nexus Admin Panel</h1>
  <h2>All Members</h2>
  <div id="usersList">Loading users...</div>

<script>
  const supabaseUrl = 'https://ifndfvvxxazhbvsssvtv.supabase.co'
  const supabaseKey = 'sb_publishable_9KWRZ03ES_a7PUpeopmV9g_z8RIbEl9'
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

  async function loadUsers() {
    const { data, error } = await supabase
      .from('members')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      document.getElementById('usersList').innerHTML = 'Error: ' + error.message
      return
    }

    let html = '<table border="1"><tr><th>Username</th><th>Balance</th><th>Commission</th><th>Referral</th><th>Joined</th></tr>'
    data.forEach(user => {
      html += `<tr>
        <td>${user.username}</td>
        <td>${user.balance}</td>
        <td>${user.commission_earned}</td>
        <td>${user.referred_by || 'None'}</td>
        <td>${new Date(user.created_at).toLocaleDateString()}</td>
      </tr>`
    })
    html += '</table>'
    
    document.getElementById('usersList').innerHTML = html
  }

  loadUsers()
</script>
</body>
</html>
