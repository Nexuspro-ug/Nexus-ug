<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2 id="status">Testing Supabase...</h2>
  <pre id="output"></pre>

<script>
const supabaseUrl = 'https://ifndfvvxxazhbvsssvtv.supabase.co';
const supabaseKey = 'PASTE_YOUR_FULL_ANON_KEY_HERE'; // Get from Supabase > Settings > API

document.getElementById('output').innerText = 'Step 1: Keys set\n';

try {
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
  document.getElementById('output').innerText += 'Step 2: Supabase client created\n';
  
  supabase.from('members').select('*').then(res => {
    if (res.error) {
      document.getElementById('status').innerText = 'ERROR FOUND:';
      document.getElementById('output').innerText += JSON.stringify(res.error, null, 2);
    } else {
      document.getElementById('status').innerText = 'SUCCESS! Database connected';
      document.getElementById('output').innerText += 'Members found: ' + JSON.stringify(res.data, null, 2);
    }
  });
} catch (e) {
  document.getElementById('status').innerText = 'JS CRASHED:';
  document.getElementById('output').innerText += e.message;
}
</script>
</body>
</html>
