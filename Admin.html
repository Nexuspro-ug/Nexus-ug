<!DOCTYPE html>
<html>
<head>
  <title>Nexus Pro Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
    h1 { color: #0f172a; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; background: white; }
    th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
    th { background: #f1f5f9; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
<h1>Nexus Pro Admin Panel</h1>
<h3>All Members</h3>
<div id="usersList">Loading members...</div>
<script>
const supabaseUrl = 'https://ifndfvvxxazhbvsssvtv.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmbmRmdnZ4eGF6aGJ2c3NzdnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTY2MTYsImV4cCI6MjA5MTg5MjYxNn0.qrF9vxAEV4UiU-sr1o824ZYRIq33UQqpuLzKO4Vo1m0';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadUsers() {
  const { data, error } = await supabase
    .from('members')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('usersList').innerHTML =
      "<div class='error'>Error: " + error.message + "</div>";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById('usersList').innerHTML =
      "No members found. Your app has not saved users yet.";
    return;
  }

  let html = "<table><tr><th>Username</th><th>Balance</th><th>Commission</th><th>Joined</th></tr>";

  data.forEach(user => {
    html += `
      <tr>
        <td>${user.username || '-'}</td>
        <td>${user.balance || 0}</td>
        <td>${user.commission_earned || 0}</td>
        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : '-'}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById('usersList').innerHTML = html;
}

loadUsers();
</script>
</body>
</html>
