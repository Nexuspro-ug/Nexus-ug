<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseUrl = 'https://ygmsmgzntgntutqbmxcg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnbXNtZ3pudGdudHV0cWJteGNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTI5NzIsImV4cCI6MjA5MTk4ODk3Mn0._EMpan3j53JTf7PiD68l38f1AmMHTC_tM1wSLDa_mDM';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadWithdrawals() {
      const { data, error } = await supabase
        .from('withdrawals')
        .select('*');

      const container = document.getElementById('withdrawals');
      container.innerHTML = '';

      data.forEach(w => {
        const div = document.createElement('div');
        div.innerHTML = `
          <p>User ID: ${w.user_id}</p>
          <p>Amount: ${w.amount}</p>
          <p>Phone: ${w.phone_number}</p>
          <p>Status: ${w.status}</p>
          <button onclick="approve(${w.id}, ${w.user_id}, ${w.amount})">Approve</button>
          <button onclick="reject(${w.id})">Reject</button>
          <hr/>
        `;
        container.appendChild(div);
      });
    }

    async function approve(id, user_id, amount) {
      // Update withdrawal status
      await supabase
        .from('withdrawals')
        .update({ status: 'approved' })
        .eq('id', id);

      alert('Approved!');
      loadWithdrawals();
    }

    async function reject(id) {
      await supabase
        .from('withdrawals')
        .update({ status: 'rejected' })
        .eq('id', id);

      alert('Rejected!');
      loadWithdrawals();
    }

    window.onload = loadWithdrawals;
  </script>
</head>
<body>
  <h1>Admin Panel</h1>
  <h2>Withdrawals</h2>
  <div id="withdrawals"></div>
</body>
</html>
