<!DOCTYPE html>
<html>
<head>
  <title>Nexus Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0"></script>
  <style>
    body { font-family: Arial; background: #7ED957; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 100%; max-width: 350px; }
    h1 { color: #2E7D32; text-align: center; margin-top: 0; }
    .tabs { display: flex; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-bottom: 3px solid #ddd; }
    .tab.active { border-bottom: 3px solid #2E7D32; color: #2E7D32; font-weight: bold; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2E7D32; color: white; border: none; border-radius: 5px; margin-top: 10px; font-size: 16px; cursor: pointer; }
    #msg { margin-top: 15px; text-align: center; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1>Nexus Pro</h1>
  <div class="tabs">
    <div class="tab active" onclick="showTab('signin')">Sign In</div>
    <div class="tab" onclick="showTab('register')">Register</div>
  </div>

  <div id="signinTab">
    <p style="text-align:center; color:#666">Already registered? Sign in here</p>
    <label><b>Username</b></label>
    <input id="loginName" placeholder="Enter your username">
    <button onclick="signIn()">Sign In</button>
  </div>

  <div id="registerTab" class="hidden">
    <p style="text-align:center; color:#666">New member? Register below</p>
    <label><b>Username</b></label>
    <input id="regName" placeholder="Choose a username">
    <button onclick="register()">Register</button>
  </div>

  <div id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://ifndfvvxxazhbvsssvtv.supabase.co'
const SUPABASE_KEY = 'sb_publishable_9KWRZ03ES_a7PUpeopmV9g_z8RIbEl9'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showTab(tab) {
  document.getElementById('signinTab').classList.toggle('hidden', tab !== 'signin');
  document.getElementById('registerTab').classList.toggle('hidden', tab !== 'register');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('msg').innerHTML = '';
}

async function register() {
  const name = document.getElementById('regName').value.trim();
  const msg = document.getElementById('msg');
  if (!name) { msg.innerHTML = 'Enter a username'; msg.style.color = 'red'; return; }
  
  msg.innerHTML = 'Registering...'; msg.style.color = 'black';
  const { error } = await supabase.from('members').insert([{ name: name, balance: 0 }]);
  
  if (error) { msg.innerHTML = 'Error: ' + error.message; msg.style.color = 'red'; }
  else { 
    msg.innerHTML = 'Success! Now sign in with your username'; 
    msg.style.color = 'green';
    document.getElementById('regName').value = '';
  }
}

async function signIn() {
  const name = document.getElementById('loginName').value.trim();
  const msg = document.getElementById('msg');
  if (!name) { msg.innerHTML = 'Enter your username'; msg.style.color = 'red'; return; }
  
  msg.innerHTML = 'Checking...'; msg.style.color = 'black';
  const { data, error } = await supabase.from('members').select().eq('name', name).single();
  
  if (error || !data) { msg.innerHTML = 'User not found. Register first'; msg.style.color = 'red'; }
  else { 
    msg.innerHTML = `Welcome back ${data.name}! Your balance: UGX ${Number(data.balance).toFixed(2)}`; 
    msg.style.color = 'green';
  }
}
</script>

</body>
</html>
