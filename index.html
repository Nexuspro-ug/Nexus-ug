<!DOCTYPE html>
<html>
<head>
  <title>Nexus Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f0fdf4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    .hidden { display: none; }

    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="box" id="authBox">
  <h2>Nexus Pro</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <div id="error" class="error"></div> 
    </div>
<div class="box hidden" id="dashboard">
  <h2>Welcome <span id="user"></span></h2>
  <p>Balance: UGX <span id="balance">0</span></p>
  <p>Commission: UGX <span id="commission">0</span></p>
</div>
<script>
const supabase = window.supabase.createClient(
  'https://ifndfvvxxazhbvsssvtv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmbmRmdnZ4eGF6aGJ2c3NzdnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTY2MTYsImV4cCI6MjA5MTg5MjYxNn0.qrF9vxAEV4UiU-sr1o824ZYRIq33UQqpuLzKO4Vo1m0'
);

// REGISTER
async function register() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('error');

  if (!username || !password) {
    errorEl.textContent = "Enter username and password";
    return;
  }

  // check existing
  const { data: existing } = await supabase
    .from('members')
    .select('username')
    .eq('username', username)
    .single();

  if (existing) {
    errorEl.textContent = "Username already exists";
    return;
  }

  const { error } = await supabase
    .from('members')
    .insert([
      {
        username: username,
        password: password,
        balance: 4000,
        commission_earned: 0
      }
    ]);

  if (error) {
    errorEl.textContent = error.message;
    return;
  }

  alert("Registered successfully!");
  loadUser(username);
}

// LOGIN
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('error');

  const { data, error } = await supabase
    .from('members')
    .select('*')
    .eq('username', username)
    .single();

  if (error || !data) {
    errorEl.textContent = "User not found";
    return;
  }

  if (data.password !== password) {
    errorEl.textContent = "Wrong password";
    return;
  }

  loadUser(username);
}

// LOAD USER
async function loadUser(username) {
  const { data } = await supabase
    .from('members')
    .select('*')
    .eq('username', username)
    .single();

  document.getElementById('authBox').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');

  document.getElementById('user').textContent = data.username;
  document.getElementById('balance').textContent = data.balance;
  document.getElementById('commission').textContent = data.commission_earned;
}

// LOGOUT
function logout() {
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('authBox').classList.remove('hidden');
}
</script>
</body>
</html>
