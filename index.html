<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { font-family: Arial; margin: 0; background: #f4fbf4; }

/* LOGIN */
#login-screen { padding: 30px; text-align: center; }
input { padding: 10px; width: 90%; margin: 5px; }
button { padding: 10px; background: green; color: white; border: none; cursor: pointer; }

/* DASHBOARD */
#app-dashboard { display: none; }
header { background: green; color: white; padding: 15px; display:flex; justify-content:space-between; }

/* TABS */
.tab { display: none; padding: 15px; }
.tab.active { display: block; }

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
}
.bottom-nav div {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
}

/* TABLE */
table { width: 100%; border-collapse: collapse; }
td, th { border-bottom: 1px solid #ccc; padding: 10px; }
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
    <h2>Nexus Pro</h2>
<input id="loginUsername" placeholder="Username"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>
<button onclick="loginUser()">Login</button>

<hr>

<input id="regUsername" placeholder="Username"><br>
<input id="regPassword" type="password" placeholder="Password"><br>
<button onclick="registerUser()">Register</button>
</div>
<!-- DASHBOARD -->
<div id="app-dashboard">
<header>
    <div>Welcome <span id="userName"></span></div>
    <button onclick="logout()">Logout</button>
</header>
<!-- HOME -->
<div id="tab-home" class="tab active">
    <h3>Balance: UGX <span id="balance">0</span></h3>
</div>
<!-- PROFIT -->
<div id="tab-profit" class="tab">
    <h2>Investment Plans (10% Daily)</h2>
    <table>
        <thead>
            <tr>
                <th>Investment</th>
                <th>Daily 10%</th>
                <th>Days</th>
                <th>Total Profit</th>
            </tr>
        </thead>
        <tbody id="profitTable"></tbody>
    </table>
</div>
<!-- TEAM -->
<div id="tab-team" class="tab">
    <h3>Referral System</h3>
    <p>Earn 10% / 4% / 2%</p>
</div>
<!-- WALLET -->
<div id="tab-wallet" class="tab">
    <h3>Withdraw Funds</h3>
    <input id="withdrawAmount" placeholder="Amount (Min 5000)">
    <button onclick="withdraw()">Withdraw</button>
</div>
<!-- NAV -->
<div class="bottom-nav">
    <div onclick="switchTab('home')">Home</div>
    <div onclick="switchTab('profit')">Profit</div>
    <div onclick="switchTab('team')">Team</div>
    <div onclick="switchTab('wallet')">Wallet</div>
</div>
</div>
<script>

// 🔑 PUT YOUR REAL SUPABASE KEYS
const supabase = window.supabase.createClient(
    "https://YOUR_PROJECT.supabase.co",
    "sb_publishable_pQ_jHDaaVAPmADSqIoG7lQ_wtdKyqbr"
);

// 📊 INVESTMENT TABLE (10K → 2M)
const plans = [10000,20000,50000,100000,200000,400000,500000,1000000,2000000];

function loadTable() {
    let html = "";
    plans.forEach(p => {
        html += `
        <tr>
            <td>${p.toLocaleString()}</td>
            <td>${(p*0.1).toLocaleString()}</td>
            <td>60</td>
            <td>${(p*0.1*60).toLocaleString()}</td>
        </tr>`;
    });
    document.getElementById("profitTable").innerHTML = html;
}
loadTable();

// 📝 REGISTER (WITH 4000 BONUS)
async function registerUser() {
    let u = regUsername.value.trim();
    let p = regPassword.value.trim();

    if (!u || !p) {
        alert("Enter username and password");
        return;
    }

    const { data: existing } = await supabase
        .from('members')
        .select('*')
        .eq('username', u)
        .single();

    if (existing) {
        alert("Username already exists");
        return;
    }

    const { error } = await supabase.from('members').insert([
        {
            username: u,
            password: p,
            balance: 4000,
            commission_earned: 0
        }
    ]);

    if (error) {
        alert("Error creating account");
        console.log(error);
        return;
    }

    alert("Account created! UGX 4,000 bonus added 🎉");
}

// 🔐 LOGIN
async function loginUser() {
    let u = loginUsername.value;
    let p = loginPassword.value;

    const { data, error } = await supabase
        .from('members')
        .select('*')
        .eq('username', u)
        .eq('password', p)
        .single();

    if (error || !data) {
        alert("Invalid login");
        return;
    }

    localStorage.setItem("user", JSON.stringify(data));
    showDashboard(data);
}

// 🏠 SHOW DASHBOARD
function showDashboard(user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-dashboard").style.display = "block";

    document.getElementById("userName").innerText = user.username;
    document.getElementById("balance").innerText = user.balance;
}

// 🚪 LOGOUT
function logout() {
    localStorage.removeItem("user");
    location.reload();
}

// 🔄 SWITCH TABS
function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
}

// 💸 WITHDRAW (MIN 5000)
async function withdraw() {
    let amount = parseInt(withdrawAmount.value);
    let user = JSON.parse(localStorage.getItem("user"));

    if (!amount || amount < 5000) {
        alert("Minimum withdrawal is UGX 5,000");
        return;
    }

    if (amount > user.balance) {
        alert("Insufficient balance");
        return;
    }

    const { error } = await supabase.from('withdrawals').insert([
        { user_id: user.id, amount: amount }
    ]);

    if (error) {
        alert("Error sending withdrawal");
        console.log(error);
        return;
    }

    alert("Withdrawal request submitted");
}

</script>

</body>
</html>
